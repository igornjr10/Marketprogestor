[build]
builder = "nixpacks"
buildCommand = "cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @marketproads/database prisma generate && pnpm --filter @marketproads/workers build"

[deploy]
startCommand = "pnpm --filter @marketproads/workers start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
